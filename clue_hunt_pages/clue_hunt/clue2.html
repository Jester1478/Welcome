<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คำใบ้ที่ 3</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

  <div class="progress-bar">
    <div class="progress-dot done"></div>
    <div class="progress-dot done"></div>
  </div>

  <div class="header">
    <div class="step-label">คำใบ้ที่ 3 / 3</div>
    <h1>ไหนๆก็ผ่านมาแล้ว รอรับคำใบ้ที่ 3 นะ 🎯</h1>
  </div>


    <div class="input-group">
      <label>คำใบ้ที่ 3</label>
      <input type="text" id="input-clue2" placeholder="พิมพ์คำใบ้จาก Steam..." autocomplete="off" />
    </div>
    <button class="btn btn-primary" onclick="checkClue()">ส่งคำใบ้ →</button>
    <div class="msg" id="msg"></div>
  </div>

  <a href="clue1.html"><button class="btn btn-secondary">← ย้อนกลับ</button></a>

</div>
<script>
  // 🔴 แก้คำใบ้ที่ถูกต้องได้ที่นี่
  const ANSWER = "Elden Lord";

  function checkClue() {
    const input = document.getElementById('input-clue2');
    const msg   = document.getElementById('msg');
    const val   = input.value.trim();

    if (!val) {
      msg.textContent = 'กรุณาพิมพ์คำใบ้ก่อนนะ';
      msg.className = 'msg error';
      input.className = 'error';
      return;
    }

    if (val.toLowerCase() === ANSWER.toLowerCase()) {
      input.className = 'success';
      msg.textContent = '✓ ถูกต้อง! เจอพี่แล้ว 🎉';
      msg.className = 'msg success';
      setTimeout(() => window.location.href = 'final.html', 900);
    } else {
      input.className = 'error';
      msg.textContent = '✗ คำใบ้ไม่ถูกต้อง ลองดูใน Steam อีกครั้ง';
      msg.className = 'msg error';
    }
  }

  document.getElementById('input-clue2').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkClue();
  });
</script>
</body>
</html>
