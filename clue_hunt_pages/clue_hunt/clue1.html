<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คำใบ้ที่ 2</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

  <div class="progress-bar">
    <div class="progress-dot done"></div>
    <div class="progress-dot"></div>
  </div>

  <div class="header">
    <div class="step-label">คำใบ้ที่ 2 / 3</div>
    <h1>น้องไม่อยากไปเล่นเกมตอบคำถามหน่อยหรอ จะได้ไม่ต้องเสียเวลามากรอกคำใบ้</h1>
  </div>

  <div class="card">
    <div class="input-group">
      <label>คำใบ้ที่ 2</label>
      <input type="text" id="input-clue1" placeholder="พิมพ์คำใบ้ที่ได้รับมา..." autocomplete="off" />
    </div>
    <button class="btn btn-primary" onclick="checkClue()">ส่งคำใบ้ →</button>
    <div class="msg" id="msg"></div>
  </div>

  <a href="index.html"><button class="btn btn-secondary">← กลับหน้าแรก</button></a>

</div>
<script>
  // 🔴 แก้คำใบ้ที่ถูกต้องได้ที่นี่
  const ANSWER = "พี่มีออมนิทริกส์";

  function checkClue() {
    const input = document.getElementById('input-clue1');
    const msg   = document.getElementById('msg');
    const val   = input.value.trim();

    if (!val) {
      msg.textContent = 'กรุณาพิมพ์คำใบ้ก่อนนะ';
      msg.className = 'msg error';
      input.className = 'error';
      return;
    }

    if (val.toLowerCase() === ANSWER.toLowerCase()) {
      input.className = 'success';
      msg.textContent = '✓ เก่งมาก! ไปคำใบ้ต่อไแดีกว่า...';
      msg.className = 'msg success';
      setTimeout(() => window.location.href = 'clue2.html', 900);
    } else {
      input.className = 'error';
      msg.textContent = '✗ เอ๊ะ! เหมือนจะยังไม่ถูกนะ';
      msg.className = 'msg error';
    }
  }

  document.getElementById('input-clue1').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkClue();
  });
</script>
</body>
</html>
