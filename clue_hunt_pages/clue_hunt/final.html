<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เจอแล้ว!</title>
<link rel="stylesheet" href="style.css">
<style>
  body { justify-content: center; }

  .final-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .top-label {
    width: 100%;
    text-align: left;
    margin-bottom: 32px;
  }

  .profile-ring {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 2px solid var(--border);
    overflow: hidden;
    background: var(--light);
    margin-bottom: 24px;
  }

  .profile-ring img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .welcome-text {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }

  .welcome-sub {
    font-size: 14px;
    color: var(--gray);
    font-weight: 300;
    line-height: 1.6;
  }

  .ig-handle {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--gray);
    margin-top: 8px;
  }

  .badge {
    display: inline-block;
    background: var(--black);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 6px 14px;
    border-radius: 100px;
    margin-top: 20px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="final-wrap">

    <div class="top-label display-flex flex-column align-items-center">
      <div class="step-label">ผ่านแล้ว!</div>
      <h1>เก่งมากๆๆๆๆ ✨</h1>
    </div>

    <div class="profile-ring margin-24">
      <!-- 🔴 เปลี่ยน URL ด้านล่างเป็นรูป IG ของคุณ -->
      <img src="https://via.placeholder.com/140x140/cccccc/888888?text=IG" alt="Profile" />
    </div>

    <!-- 🔴 แก้ข้อความต้อนรับด้านล่างได้เลย -->
    <div class="welcome-text">บอกแล้วพี่มีออมนิทริกส์</div>

    <div class="badge">🏆 MISSION COMPLETE</div>

    <a href="index.html" style="width:100%">
      <button class="btn btn-secondary" style="margin-top: 24px;">← กลับหน้าแรก</button>
    </a>

  </div>
</div>
</body>
</html>
