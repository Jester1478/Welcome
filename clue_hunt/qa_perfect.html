<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สายรหัส — เพอร์เฟกต์!</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f4f0;
      --ink: #111111;
      --mid: #555555;
      --muted: #aaaaaa;
      --border: #dddddd;
      --gold: #fbbf24;
    }

    body {
      font-family: 'IBM Plex Sans Thai', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 48px 24px;
    }

    /* ── Confetti ── */
    @keyframes fall {
      0% {
        transform: translateY(-60px) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    .confetti-piece {
      position: fixed;
      top: -60px;
      border-radius: 2px;
      animation: fall linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      text-align: center;
    }

    /* ── Score ring ── */
    .score-ring {
      width: 136px;
      height: 136px;
      border-radius: 50%;
      background: conic-gradient(var(--ink) 360deg, #e5e5e5 0deg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      filter: drop-shadow(0 6px 20px rgba(0, 0, 0, .10));
      margin-bottom: 28px;
    }

    .score-ring::before {
      content: '';
      position: absolute;
      width: 106px;
      height: 106px;
      background: var(--bg);
      border-radius: 50%;
    }

    .score-inner {
      position: relative;
      z-index: 1;
      text-align: center;
      line-height: 1;
    }

    .score-number {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 30px;
      font-weight: 700;
      color: var(--ink);
    }

    .score-divider {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: .05em;
    }

    .score-denom {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Profile Box (สี่เหลี่ยมมุมมน) ── */
    .profile-box {
      width: 400px;
      height: 400px;
      border-radius: 10px; /* กำหนดความโค้งมนที่นี่ */
      border: 2px solid var(--border);
      overflow: hidden;
      background: #e8e6e0;
      margin-bottom: 24px;
      flex-shrink: 0;
    }

    .profile-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── Text block ── */
    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .headline {
      font-size: 28px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .subline {
      font-size: 15px;
      color: var(--mid);
      line-height: 1.65;
      margin-bottom: 32px;
    }

    /* ── Button ── */
    .btn-back {
      width: 100%;
      padding: 14px 20px;
      background: transparent;
      color: var(--ink);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: border-color .15s, background .15s;
      text-decoration: none;
      display: block;
    }

    .btn-back:hover {
      border-color: var(--ink);
      background: rgba(0, 0, 0, .03);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes popIn {
      0% {
        transform: scale(0.7);
        opacity: 0;
      }

      70% {
        transform: scale(1.06);
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .fade-up {
      opacity: 0;
      animation: fadeUp .45s ease forwards;
    }

    .pop-in {
      opacity: 0;
      animation: popIn .55s cubic-bezier(.34, 1.56, .64, 1) forwards;
    }
  </style>
</head>

<body>

  <!-- Confetti (JS populates) -->
  <div id="confetti-container" aria-hidden="true"></div>

  <main class="card">

    <!-- Score ring -->
    <div class="score-ring pop-in" style="animation-delay:.1s">
      <div class="score-inner">
        <div class="score-number">10</div>
        <div class="score-divider">────</div>
        <div class="score-denom">10</div>
      </div>
    </div>

    <div class="profile-box fade-up" style="animation-delay:.35s">
      <img src="Picture/Moh.jpg" alt="Picture" />
    </div>

    <!-- Text -->
    <div class="fade-up" style="animation-delay:.35s">
      <h1 class="subline" style="font-size: 20px;">ตอบถูกหมดแบบนี้ ถ้าไม่เก่งก็ให้ AI ทำแน่นอน</h1>
    </div>

    <!-- Back button -->
    <div class="fade-up" style="animation-delay:.5s; width:100%">
      <a class="btn-back" href="qa.html">← ทำแบบทดสอบอีกครั้ง</a>
    </div>

  </main>

  <script>
    const colors = ['#fbbf24', '#34d399', '#60a5fa', '#f87171', '#a78bfa', '#fb923c', '#4ade80'];
    const container = document.getElementById('confetti-container');

    for (let i = 0; i < 55; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const size = Math.random() * 8 + 6;
      el.style.cssText = `
        left: ${Math.random() * 100}vw;
        width: ${size}px;
        height: ${size}px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration: ${Math.random() * 3 + 2.5}s;
        animation-delay: ${Math.random() * 2}s;
        border-radius: ${Math.random() > .5 ? '50%' : '2px'};
        opacity: ${Math.random() * .6 + .4};
      `;
      container.appendChild(el);
    }
  </script>

</body>

</html>
