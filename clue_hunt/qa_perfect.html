<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สายรหัส — เพอร์เฟกต์!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'IBM Plex Sans Thai', sans-serif;
      background: #f5f4f0;
    }

    /* ── Confetti ── */
    @keyframes fall {
      0%   { transform: translateY(-60px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh)  rotate(720deg); opacity: 0; }
    }
    .confetti-piece {
      position: fixed;
      top: -60px;
      border-radius: 2px;
      animation: fall linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Score ring ── */
    .score-ring {
      width: 136px;
      height: 136px;
      border-radius: 50%;
      background: conic-gradient(#111111 360deg, #e5e5e5 0deg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      filter: drop-shadow(0 6px 20px rgba(0,0,0,.10));
    }
    .score-ring::before {
      content: '';
      position: absolute;
      width: 106px;
      height: 106px;
      background: #f5f4f0;
      border-radius: 50%;
    }
    .score-inner {
      position: relative;
      z-index: 1;
      text-align: center;
      line-height: 1;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    @keyframes popIn {
      0%   { transform: scale(0.7);  opacity: 0; }
      70%  { transform: scale(1.06); }
      100% { transform: scale(1);    opacity: 1; }
    }
    .fade-up {
      opacity: 0;
      animation: fadeUp .45s ease forwards;
    }
    .pop-in {
      opacity: 0;
      animation: popIn .55s cubic-bezier(.34,1.56,.64,1) forwards;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center overflow-x-hidden px-6 py-12">

  <!-- Confetti -->
  <div id="confetti-container" aria-hidden="true"></div>

  <main class="relative z-10 w-full max-w-sm flex flex-col items-center text-center gap-0">

    <!-- Score ring -->
    <div class="score-ring pop-in mb-7" style="animation-delay:.1s">
      <div class="score-inner">
        <div class="font-mono text-[30px] font-bold text-[#111111]">10</div>
        <div class="text-[12px] text-[#aaaaaa] mt-0.5 tracking-[.05em]">────</div>
        <div class="text-[12px] text-[#aaaaaa] mt-0.5">10</div>
      </div>
    </div>

    <!-- Profile image -->
    <div class="fade-up w-[400px] h-[400px] rounded-[10px] border-2 border-[#dddddd] overflow-hidden bg-[#e8e6e0] mb-6 shrink-0" style="animation-delay:.35s">
      <img src="Picture/Moh.jpg" alt="Picture" class="w-full h-full object-cover" />
    </div>

    <!-- Text -->
    <div class="fade-up" style="animation-delay:.35s">
      <h1 class="text-[20px] text-[#555555] leading-[1.65]">ตอบถูกหมดแบบนี้ ถ้าไม่เก่งก็ให้ AI ทำแน่นอน</h1>
    </div>

    <!-- Back button -->
    <div class="fade-up w-full mt-8" style="animation-delay:.5s">
      <a href="qa.html"
        class="block w-full py-[14px] px-5 bg-transparent text-[#111111] border-[1.5px] border-[#dddddd] rounded-[10px] text-[15px] font-semibold transition-all duration-150 hover:border-[#111111] hover:bg-black/[.03] no-underline">
        ← ทำแบบทดสอบอีกครั้ง
      </a>
    </div>

  </main>

  <script>
    const colors = ['#fbbf24','#34d399','#60a5fa','#f87171','#a78bfa','#fb923c','#4ade80'];
    const container = document.getElementById('confetti-container');

    for (let i = 0; i < 55; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const size = Math.random() * 8 + 6;
      el.style.cssText = `
        left: ${Math.random() * 100}vw;
        width: ${size}px;
        height: ${size}px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration: ${Math.random() * 3 + 2.5}s;
        animation-delay: ${Math.random() * 2}s;
        border-radius: ${Math.random() > .5 ? '50%' : '2px'};
        opacity: ${Math.random() * .6 + .4};
      `;
      container.appendChild(el);
    }
  </script>

</body>
</html>
