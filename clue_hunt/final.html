<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เจอแล้ว!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#f5f4f0] text-[#111111] min-h-screen flex flex-col items-center justify-center px-6 py-8">

  <div class="w-full max-w-lg fade-in flex flex-col items-center text-center">

    <!-- Top label (left-aligned) -->
    <div class="w-full text-left mb-8 mx-auto text-center">
      <p class="font-mono text-[11px] text-gray-400 tracking-[3px] uppercase mb-2">ผ่านแล้ว!</p>
      <h1 class="text-[26px] font-semibold leading-snug tracking-tight">เก่งมากๆๆๆๆ ✨</h1>
    </div>

    <!-- Profile picture -->
    <div class="w-60 h-60 rounded-full border-2 border-[#dddddd] overflow-hidden bg-[#e8e6e0] mb-6">
      <!-- 🔴 เปลี่ยน URL ด้านล่างเป็นรูป IG ของคุณ -->
      <img src="Picture/Raz.jpg" alt="Profile"
        class="w-full h-full object-cover" />
    </div>

    <!-- 🔴 แก้ข้อความต้อนรับด้านล่างได้เลย -->
    <p class="text-[22px] font-semibold tracking-tight mb-1">บอกแล้วพี่มีออมนิทริกส์</p>

    <!-- Badge -->
    <span
      class="inline-block bg-[#111111] text-white font-mono text-[20px] tracking-wider px-4 py-1.5 rounded-full mt-5">
      🏆 MISSION COMPLETE
    </span>

    <a href="index.html" class="w-full mt-6">
      <button
        class="w-full py-4 bg-transparent text-[#111111] border-[1.5px] border-[#dddddd] rounded-lg text-[15px] font-semibold cursor-pointer transition-all duration-150 hover:border-[#111111]">
        ← กลับหน้าแรก
      </button>
    </a>

  </div>
</body>

</html>
