<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สายรหัส — ผลคะแนน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'IBM Plex Sans Thai', sans-serif;
      background: #f5f4f0;
    }

    /* score-ring ใช้ conic-gradient + ::before pseudo-element → ต้องเก็บไว้ใน CSS */
    .score-ring {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: conic-gradient(#111111 var(--pct), #e5e5e5 0deg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .score-ring::before {
      content: '';
      position: absolute;
      width: 108px;
      height: 108px;
      background: #f5f4f0;
      border-radius: 50%;
    }
    .score-inner {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    /* summary-bar-fill ใช้ transition แบบ delay → เก็บไว้ */
    .summary-bar-fill {
      background: #111;
      border-radius: 99px;
      transition: width 1s ease 0.5s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    .fade-up {
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }
  </style>
</head>

<body class="min-h-screen px-5 py-10">

  <div class="w-full max-w-lg mx-auto" id="app">
    <div class="text-center py-20 opacity-40">
      <p class="text-[15px]">กำลังโหลดผลคะแนน...</p>
    </div>
  </div>

  <script>
    const QUESTIONS = [
      {
        name: "q1", question: "ภาษาโปรแกรมมิ่งที่ถูกใช้งานมากที่สุดในโลกคือภาษาอะไร?",
        correct: "Python",
        choices: { "Html": "HTML", "Python": "Python", "JavaScript": "JavaScript", "C++": "C++" }
      },
      {
        name: "q2", question: "Front-end คืออะไร?",
        correct: "ui",
        choices: {
          "database": "การจัดการระบบฐานข้อมูลและการจัดเก็บข้อมูลบน Server",
          "ui": "ส่วนประกอบของเว็บไซต์ที่ผู้ใช้งานมองเห็นและโต้ตอบได้",
          "logic": "การเขียน Logic หลังบ้านเพื่อคำนวณข้อมูลที่ซับซ้อน",
          "api": "การเชื่อมต่อระหว่างระบบปฏิบัติการกับฮาร์ดแวร์คอมพิวเตอร์"
        }
      },
      {
        name: "q3", question: "Back-end คืออะไร?",
        correct: "logic",
        choices: {
          "design": "การออกแบบสีสันและ Layout ของเว็บไซต์ให้สวยงาม",
          "logic": "ส่วนการประมวลผลของ Server, การจัดการฐานข้อมูล และ Logic หลังบ้าน",
          "browser": "โปรแกรมที่ใช้สำหรับเปิดดูเว็บไซต์ เช่น Chrome หรือ Safari",
          "hardware": "อุปกรณ์ฮาร์ดแวร์ เช่น เมาส์ คีย์บอร์ด และจอภาพ"
        }
      },
      {
        name: "q4", question: "โปรแกรมที่นิยมใช้เขียนโค้ดมากที่สุดในปัจจุบันคืออะไร?",
        correct: "VSCode",
        choices: { "Notepad": "Notepad++", "Sublime": "Sublime Text", "Codepen": "Codepen", "VSCode": "Visual Studio Code" }
      },
      {
        name: "q5", question: "Git คืออะไร?",
        correct: "vcs",
        choices: {
          "vcs": "ระบบควบคุมเวอร์ชัน (Version Control) ที่บันทึกประวัติการแก้ไขโค้ด และช่วยให้ทำงานร่วมกันเป็นทีมได้",
          "cloud": "บริการคลาวด์เซิร์ฟเวอร์ (Cloud) สำหรับฝากไฟล์และโชว์ผลงานโปรเจคของโปรแกรมเมอร์",
          "pkg": "เครื่องมือสำหรับดาวน์โหลดและจัดการ Library หรือ Package ต่างๆ ที่ต้องใช้ในโปรเจค",
          "deploy": "ระบบอัตโนมัติที่ช่วยแปลงโค้ดและอัพโหลดเว็บไซต์ขึ้นไปบน Server (Deployment)"
        }
      },
      {
        name: "q6", question: "ข้อใดคือความหมายของ Algorithm?",
        correct: "steps",
        choices: {
          "language": "ภาษาที่ใช้สื่อสารระหว่างโปรแกรมเมอร์กับคอมพิวเตอร์",
          "steps": "ขั้นตอนหรือวิธีการที่กำหนดไว้ชัดเจนเพื่อแก้ปัญหาหรือทำงานอย่างใดอย่างหนึ่งให้สำเร็จ",
          "hardware": "ฮาร์ดแวร์ที่ใช้ประมวลผลข้อมูลภายในคอมพิวเตอร์",
          "network": "โปรโตคอลที่ใช้รับส่งข้อมูลระหว่างอุปกรณ์ในเครือข่าย"
        }
      },
      {
        name: "q7", question: 'ในการเขียนโปรแกรม "Variable" หรือตัวแปรคืออะไร?',
        correct: "storage",
        choices: {
          "func": "กลุ่มของคำสั่งที่ถูกรวบรวมไว้เพื่อเรียกใช้ซ้ำได้",
          "storage": "ที่เก็บข้อมูลชั่วคราวในหน่วยความจำ สามารถเปลี่ยนแปลงค่าได้ระหว่างโปรแกรมทำงาน",
          "loop": "คำสั่งที่ทำให้โปรแกรมวนซ้ำตามเงื่อนไขที่กำหนด",
          "class": "โครงสร้างข้อมูลที่ใช้ในการเขียนโปรแกรมเชิงวัตถุ (OOP)"
        }
      },
      {
        name: "q8", question: '"Bug" ในโปรแกรมมิ่งหมายถึงอะไร?',
        correct: "error",
        choices: {
          "feature": "ฟีเจอร์ใหม่ที่เพิ่มเข้ามาในโปรแกรม",
          "comment": "คำอธิบายโค้ดที่โปรแกรมเมอร์เขียนเอาไว้อ่านเอง",
          "update": "การอัปเดตโปรแกรมเพื่อปรับปรุงประสิทธิภาพ",
          "error": "ข้อผิดพลาดในโค้ดที่ทำให้โปรแกรมทำงานไม่ถูกต้องหรือขัดข้อง"
        }
      },
      {
        name: "q9", question: "คำสั่ง if-else ใช้ทำอะไร?",
        correct: "condition",
        choices: {
          "condition": "ตรวจสอบเงื่อนไข แล้วเลือกทำงานในเส้นทางที่ต่างกันตามผลที่ได้",
          "loop": "วนซ้ำคำสั่งจนกว่าจะครบจำนวนที่กำหนด",
          "define": "ประกาศฟังก์ชันเพื่อนำไปใช้ภายหลัง",
          "import": "นำ Library จากภายนอกเข้ามาใช้ในโปรแกรม"
        }
      },
      {
        name: "q10", question: "API ย่อมาจากอะไร และมีหน้าที่อะไร?",
        correct: "api",
        choices: {
          "api": "Application Programming Interface — ตัวกลางที่ให้โปรแกรมต่างๆ สื่อสารและแลกเปลี่ยนข้อมูลกันได้",
          "apu": "Automated Program Installer — ระบบที่ช่วยติดตั้งโปรแกรมโดยอัตโนมัติ",
          "aps": "Advanced Programming Interface — ระบบขั้นสูงสำหรับโปรแกรมเมอร์มืออาชีพ",
          "apr": "Application Protocol Router — อุปกรณ์ที่ใช้กำหนดเส้นทางของข้อมูลในเครือข่าย"
        }
      }
    ];

    function getScoreLabel(score, total) {
      const pct = score / total;
      if (pct === 1)    return { label: "เพอร์เฟกต์! 🎉", sub: "ได้คะแนนเต็มทุกข้อเลย" };
      if (pct >= 0.8)   return { label: "ดีมาก 👏",       sub: "ความรู้พื้นฐานแน่นหรือฟลุคกันนะ" };
      if (pct >= 0.6)   return { label: "ผ่านครึ่ง 👍",      sub: "ถือว่าพอมีพื้นฐานอยู่" };
      if (pct >= 0.4)   return { label: "พอไหวนะ 🙂",       sub: "อย่างน้อยก็เดาได้" };
      return { label: "ยังต้องฝึกอีก 💪", sub: "ไม่อยากเชื่อเลยว่าจะตอบแบบหลบข้อถูก" };
    }

    function render(results) {
      const total    = QUESTIONS.length;
      const score    = results ? results.filter(r => r.isCorrect).length : 0;
      const pct      = Math.round((score / total) * 100);
      const ringDeg  = Math.round((score / total) * 360);
      const { label, sub } = getScoreLabel(score, total);

      const questionsHTML = QUESTIONS.map((q, idx) => {
        const result    = results ? results.find(r => r.question === q.question) : null;
        const selected  = result ? result.selected : null;
        const isCorrect = result ? result.isCorrect : null;

        // q-card border color via Tailwind
        const cardBorder = isCorrect === true
          ? 'border-[#86efac]'
          : isCorrect === false
            ? 'border-[#fca5a5]'
            : 'border-[#e5e5e5]';

        // result icon
        const iconHtml = result !== null
          ? `<div class="mt-0.5 w-7 h-7 rounded-full flex items-center justify-center text-[14px] shrink-0 ${
              isCorrect
                ? 'bg-[#dcfce7] text-[#16a34a]'
                : 'bg-[#fee2e2] text-[#dc2626]'
            }">${isCorrect ? '✓' : '✕'}</div>`
          : '';

        const choicesHTML = Object.entries(q.choices).map(([val, lbl]) => {
          const isAnswer   = val === q.correct;
          const isSelected = val === selected;

          // choice-row styles
          let rowClasses, badge;
          if (isAnswer && isSelected) {
            rowClasses = 'bg-[#f0faf4] border border-[1.5px] border-[#22c55e]';
            badge = `<span class="font-mono text-[11px] font-semibold px-2 py-0.5 rounded-full whitespace-nowrap shrink-0 mt-px bg-[#22c55e] text-white">✓ ถูก</span>`;
          } else if (!isAnswer && isSelected) {
            rowClasses = 'bg-[#fff5f5] border border-[1.5px] border-[#ef4444]';
            badge = `<span class="font-mono text-[11px] font-semibold px-2 py-0.5 rounded-full whitespace-nowrap shrink-0 mt-px bg-[#ef4444] text-white">✕ ผิด</span>`;
          } else if (isAnswer) {
            rowClasses = 'bg-[#f0faf4] border border-[1.5px] border-[#22c55e]';
            badge = `<span class="font-mono text-[11px] font-semibold px-2 py-0.5 rounded-full whitespace-nowrap shrink-0 mt-px bg-[#111111] text-white">เฉลย</span>`;
          } else {
            rowClasses = 'bg-[#fafafa] border border-[1.5px] border-[#eeeeee] text-[#888888]';
            badge = '';
          }

          return `<div class="flex items-start gap-[10px] px-3 py-[10px] rounded-lg text-[14px] leading-[1.5] ${rowClasses}">
            <div class="flex-1">${lbl}</div>${badge}
          </div>`;
        }).join('');

        const delayS = (0.05 * idx + 0.45).toFixed(2);

        return `
        <div class="fade-up bg-white border-[1.5px] ${cardBorder} rounded-[14px] px-[22px] pt-[22px] pb-[18px] mb-3" style="animation-delay:${delayS}s">
          <div class="flex items-start gap-[10px] mb-[14px]">
            <div class="flex-1">
              <div class="font-mono text-[11px] font-semibold text-[#888888] tracking-[0.05em] mb-1.5">ข้อ ${idx + 1}</div>
              <div class="text-[16px] font-semibold text-[#111111] leading-[1.45]">${q.question}</div>
            </div>
            ${iconHtml}
          </div>
          <div class="flex flex-col gap-[7px]">${choicesHTML}</div>
        </div>`;
      }).join('');

      document.getElementById('app').innerHTML = `
        <!-- Header -->
        <div class="fade-up text-center mb-7" style="animation-delay:.05s">
          <p class="text-[22px] font-bold text-[#111111] mb-0.5">ผลการทำแบบทดสอบ</p>
        </div>

        <!-- Score card -->
        <div class="fade-up bg-white border-[1.5px] border-[#e5e5e5] rounded-[18px] px-[22px] py-7 mb-5" style="animation-delay:.15s">
          <div class="flex items-center gap-6 flex-wrap">
            <div class="score-ring" style="--pct:${ringDeg}deg">
              <div class="score-inner">
                <div class="font-mono text-[30px] font-semibold text-[#111111] leading-none">${score}</div>
                <div class="text-[13px] text-[#aaaaaa] mt-0.5">/ ${total}</div>
              </div>
            </div>
            <div class="flex-1 min-w-[140px]">
              <div class="text-[20px] font-bold text-[#111111] mb-0.5">${label}</div>
              <div class="text-[14px] text-[#777777] mb-[14px]">${sub}</div>
              <div class="flex justify-between text-[13px] font-semibold text-[#111111] mb-1">
                <span>คะแนน</span>
                <span class="font-mono">${pct}%</span>
              </div>
              <div class="flex bg-[#e5e5e5] rounded-full h-2 overflow-hidden mt-1.5">
                <div class="summary-bar-fill" style="width:${pct}%"></div>
              </div>
              <div class="flex gap-4 mt-2.5 text-[13px]">
                <span class="text-[#16a34a] font-semibold">✓ ถูก ${score} ข้อ</span>
                <span class="text-[#dc2626] font-semibold">✕ ผิด ${total - score} ข้อ</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Legend -->
        <div class="fade-up flex gap-[10px] flex-wrap mb-4" style="animation-delay:.28s">
          <div class="flex items-center gap-1.5 text-[12px] text-[#555555]">
            <div class="w-3.5 h-3.5 rounded-[3px] bg-[#f0faf4] border-[1.5px] border-[#22c55e]"></div>
            <span>ตอบถูก / เฉลย</span>
          </div>
          <div class="flex items-center gap-1.5 text-[12px] text-[#555555]">
            <div class="w-3.5 h-3.5 rounded-[3px] bg-[#fff5f5] border-[1.5px] border-[#ef4444]"></div>
            <span>ตอบผิด</span>
          </div>
          <div class="flex items-center gap-1.5 text-[12px] text-[#555555]">
            <div class="w-3.5 h-3.5 rounded-[3px] bg-[#fafafa] border-[1.5px] border-[#eeeeee]"></div>
            <span>ตัวเลือกอื่น</span>
          </div>
        </div>

        <!-- Questions -->
        ${questionsHTML}

        <!-- Buttons -->
        <button onclick="window.location.href='qa_final.html'"
          class="w-full py-4 bg-[#111111] text-white rounded-lg text-[15px] font-semibold cursor-pointer transition-all duration-150 hover:bg-[#333333] active:scale-[0.98] mb-3">
          ถัดไป
        </button>
        <a href="index.html">
          <button class="w-full py-4 bg-transparent text-[#111111] border-[1.5px] border-[#dddddd] rounded-lg text-[15px] font-semibold cursor-pointer transition-all duration-150 hover:border-[#111111]">
            กลับหน้าแรก
          </button>
        </a>
      `;
    }

    window.addEventListener('DOMContentLoaded', () => {
      const raw = sessionStorage.getItem('qa_results');
      if (raw) {
        try { render(JSON.parse(raw)); }
        catch (e) { render(null); }
      } else {
        render(null);
      }
    });
  </script>
</body>

</html>
