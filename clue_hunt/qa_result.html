<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สายรหัส — ผลคะแนน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f5f4f0] text-[#111111] min-h-screen flex flex-col items-center justify-center px-6 py-8">

<div class="w-full max-w-lg fade-in">

  <!-- Score card -->
  <div class="bg-white border border-[#dddddd] rounded-xl p-7 mb-6 text-center">
    <p class="font-mono text-[11px] text-gray-400 tracking-[3px] uppercase mb-3">ผลคะแนน</p>
    <div id="score-display" class="text-[52px] font-semibold tracking-tight leading-none mb-2">—</div>
    <p id="score-label" class="text-[15px] text-gray-400 font-light"></p>
  </div>

  <!-- Review section -->
  <p class="font-mono text-[11px] text-gray-400 tracking-[3px] uppercase mb-3">ดูเฉลย</p>
  <div id="review-list" class="flex flex-col gap-4 mb-6"></div>

  <!-- Actions -->
  <button onclick="window.location.href='qa2.html'"
    class="w-full py-4 bg-[#111111] text-white rounded-lg text-[15px] font-semibold cursor-pointer transition-all duration-150 hover:bg-[#333] active:scale-[0.98] mb-3">
    ถัดไป
  </button>
  <a href="index.html">
    <button class="w-full py-4 bg-transparent text-[#111111] border-[1.5px] border-[#dddddd] rounded-lg text-[15px] font-semibold cursor-pointer transition-all duration-150 hover:border-[#111111]">
      ← กลับหน้าแรก
    </button>
  </a>

</div>
<script>
  const raw = sessionStorage.getItem('qa_results');

  // ป้องกันคนเข้าหน้านี้ตรงๆ โดยไม่ผ่าน qa.html
  if (!raw) {
    window.location.href = 'qa.html';
  }

  const results = JSON.parse(raw);
  const total   = results.length;
  const score   = results.filter(r => r.isCorrect).length;

  // แสดงคะแนน
  document.getElementById('score-display').textContent = `${score}/${total}`;
  const label = document.getElementById('score-label');
  if (score === total) {
    label.textContent = 'เก่งมาก! ตอบถูกหมดเลย 🎉';
    label.classList.add('text-[#2d6a4f]');
  } else if (score === 0) {
    label.textContent = 'ลองอีกครั้งนะ สู้ๆ 💪';
    label.classList.add('text-[#c0392b]');
  } else {
    label.textContent = `ตอบถูก ${score} ข้อ จาก ${total} ข้อ`;
  }

  // แสดงเฉลยแต่ละข้อ
  const reviewList = document.getElementById('review-list');
  results.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'bg-white border border-[#dddddd] rounded-xl p-6';
    div.innerHTML = `
      <p class="text-[14px] font-semibold mb-4 leading-snug">${i + 1}. ${r.question}</p>

      <!-- คำตอบของน้อง -->
      <div class="flex items-start gap-3 mb-2 p-3 rounded-lg ${r.isCorrect ? 'bg-[#e9f5ee]' : 'bg-[#fdecea]'}">
        <span class="text-[16px] mt-0.5">${r.isCorrect ? '✓' : '✗'}</span>
        <div>
          <p class="text-[11px] font-mono uppercase tracking-wider ${r.isCorrect ? 'text-[#2d6a4f]' : 'text-[#c0392b]'} mb-0.5">
            คำตอบของน้อง
          </p>
          <p class="text-[14px] ${r.isCorrect ? 'text-[#2d6a4f]' : 'text-[#c0392b]'} font-medium">${r.selectedLabel}</p>
        </div>
      </div>

      <!-- เฉลย (แสดงเฉพาะตอนตอบผิด) -->
      ${!r.isCorrect ? `
      <div class="flex items-start gap-3 p-3 rounded-lg bg-[#e9f5ee]">
        <span class="text-[16px] mt-0.5">💡</span>
        <div>
          <p class="text-[11px] font-mono uppercase tracking-wider text-[#2d6a4f] mb-0.5">เฉลย</p>
          <p class="text-[14px] text-[#2d6a4f] font-medium">${r.correctLabel}</p>
        </div>
      </div>` : ''}
    `;
    reviewList.appendChild(div);
  });
</script>
</body>
</html>
