<!DOCTYPE html>

<body class="bg-[#f5f4f0] text-[#111111] min-h-screen flex flex-col items-center justify-center px-6 py-8">

<div class="w-full max-w-sm fade-in">

  </div>

  <!-- Choice: กรอกคำใบ้ -->
  <a href="clue1.html"
     class="flex items-center gap-4 bg-white border-[1.5px] border-[#dddddd] rounded-xl px-6 py-5 mb-3 no-underline text-inherit transition-all duration-200 hover:border-[#111111] hover:-translate-y-px hover:shadow-lg block">

  <!-- Choice: ทายคำถาม -->
  <a href="qa.html"
